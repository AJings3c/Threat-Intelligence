<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        let stored = null;
        try {
          stored = window.localStorage.getItem('theme');
        } catch {}
        const theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.classList.toggle('light', theme === 'light');
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="icon" type="image/png" href="/brand-logo-dark.png" />
    <link rel="apple-touch-icon" href="/brand-logo-dark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Global Threat Intelligence Platform — unified situational awareness across public cyber threat intel feeds."
    />
    <title>Threat Intelligence Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
